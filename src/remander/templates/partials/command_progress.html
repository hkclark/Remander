{% if active_command %}
<div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
    <div class="flex items-center justify-between mb-2">
        <h2 class="text-sm font-medium text-blue-800">Active Command</h2>
        <span class="px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-700">
            Running
        </span>
    </div>
    <div class="text-sm text-blue-900">
        <span class="font-mono">{{ active_command.command_type }}</span>
        {% if active_command.started_at %}
        <span class="text-blue-600 ml-2">
            started {{ active_command.started_at.strftime('%H:%M:%S') }}
        </span>
        {% endif %}
    </div>
</div>
{% endif %}
