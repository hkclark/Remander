{% extends "base.html" %}
{% block title %}Tags - Remander{% endblock %}
{% block nav_tags %}bg-gray-900{% endblock %}

{% block content %}
<div class="space-y-6">
    <h1 class="text-2xl font-bold text-gray-900">Tags</h1>

    <!-- Create tag form -->
    <div class="bg-white rounded-lg shadow p-4">
        <form method="post" action="/tags/create" class="flex items-end space-x-3">
            <div class="flex-1">
                <label for="name" class="block text-sm font-medium text-gray-700">New Tag</label>
                <input type="text" name="name" id="name" required placeholder="Tag name"
                       class="mt-1 block w-full rounded border-gray-300 shadow-sm">
            </div>
            <div class="flex items-center pb-1">
                <input type="checkbox" name="show_on_dashboard" id="show_on_dashboard" class="rounded border-gray-300">
                <label for="show_on_dashboard" class="ml-2 text-sm text-gray-700 whitespace-nowrap">Show on dashboard</label>
            </div>
            <button type="submit"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow text-sm font-medium">
                Create
            </button>
        </form>
    </div>

    <!-- Tag list -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Devices</th>
                    <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">Dashboard</th>
                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                {% for tag in tags %}
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium text-gray-900">{{ tag.name }}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">{{ tag.device_count }}</td>
                    <td class="px-4 py-3 text-center">
                        <form action="/tags/{{ tag.id }}/toggle-dashboard" method="post" class="inline">
                            <button type="submit" title="Toggle dashboard visibility"
                                    class="text-lg {% if tag.show_on_dashboard %}text-amber-500{% else %}text-gray-300 hover:text-gray-400{% endif %}">
                                {% if tag.show_on_dashboard %}&#9733;{% else %}&#9734;{% endif %}
                            </button>
                        </form>
                    </td>
                    <td class="px-4 py-3 text-right">
                        <form action="/tags/{{ tag.id }}/delete" method="post" class="inline"
                              hx-confirm="Delete tag '{{ tag.name }}'?">
                            <button type="submit" class="text-red-600 hover:underline text-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="px-4 py-8 text-center text-gray-500">No tags created yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
