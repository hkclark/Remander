{% extends "base.html" %}
{% block title %}Edit Tag - Remander{% endblock %}
{% block nav_tags %}bg-gray-900{% endblock %}

{% block content %}
<div class="space-y-6">
    <h1 class="text-2xl font-bold text-gray-900">Edit Tag</h1>

    <div class="bg-white rounded-lg shadow p-6">
        <form method="post" action="/tags/{{ tag.id }}/edit" class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" name="name" id="name" required
                       value="{{ tag.name }}"
                       class="mt-1 block w-full rounded border-gray-300 shadow-sm">
            </div>
            <div class="flex items-center">
                <input type="checkbox" name="show_on_dashboard" id="show_on_dashboard"
                       {{ 'checked' if tag.show_on_dashboard else '' }}
                       class="rounded border-gray-300">
                <label for="show_on_dashboard" class="ml-2 text-sm text-gray-700">Show on dashboard</label>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Color <span class="font-normal text-gray-400">(optional)</span></label>
                {% with selected_color=tag.color %}
                {% include "tags/_color_picker.html" %}
                {% endwith %}
            </div>
            <div class="flex justify-end space-x-3">
                <a href="/tags" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg text-sm">
                    Cancel
                </a>
                <button type="submit"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow text-sm font-medium">
                    Update
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
