{% if error %}
<p class="text-sm text-red-600 font-medium">{{ error }}</p>
{% elif presets %}
<div class="grid grid-cols-2 gap-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Away Preset</label>
        <select name="ptz_away_preset" class="block w-full rounded border-gray-300 shadow-sm text-sm">
            <option value="">— None —</option>
            {% for name, pid in presets.items() %}
            <option value="{{ pid }}">{{ name }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Home Preset</label>
        <select name="ptz_home_preset" class="block w-full rounded border-gray-300 shadow-sm text-sm">
            <option value="">— None —</option>
            {% for name, pid in presets.items() %}
            <option value="{{ pid }}">{{ name }}</option>
            {% endfor %}
        </select>
    </div>
</div>
{% else %}
<p class="text-sm text-gray-500">No presets returned from NVR. The camera may need to be powered on first.</p>
{% endif %}
