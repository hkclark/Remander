<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<main class="max-w-lg mx-auto px-4 py-8 space-y-6">

    {% if show_mode %}
    <div class="flex justify-end">
        <div class="px-4 py-2 rounded-lg text-base font-semibold
                    {% if current_mode == 'away' %}bg-red-100 text-red-800 border border-red-300
                    {% else %}bg-green-100 text-green-800 border border-green-300{% endif %}">
            Mode: {{ current_mode|capitalize if current_mode else 'Home' }}
        </div>
    </div>
    {% endif %}

    {% if dashboard_buttons %}
    <div class="grid grid-cols-1 gap-4">
        {% for button in dashboard_buttons %}
        <form action="/commands/execute/button/{{ button.id }}" method="post">
            <button type="submit"
                    class="w-full py-5 px-6 {{ button.tailwind_classes }} text-white font-semibold rounded-xl shadow text-xl">
                {{ button.name }}
                {% if button.delay_seconds %}
                <span class="block text-sm font-normal opacity-80">after {{ button.delay_seconds }}s</span>
                {% endif %}
            </button>
        </form>
        {% endfor %}
    </div>
    {% else %}
    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 text-sm text-yellow-800">
        No buttons available.
    </div>
    {% endif %}

</main>
</body>
</html>
