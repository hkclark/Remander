{% extends "base.html" %}
{% block title %}Setup - Remander{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-sm bg-white rounded-lg shadow p-8 space-y-6">
        <div class="text-center space-y-1">
            <h1 class="text-2xl font-bold text-gray-900">Welcome to Remander</h1>
            <p class="text-sm text-gray-500">Create your administrator account to get started.</p>
        </div>

        {% if error %}
        <div class="px-4 py-3 rounded-lg bg-red-50 text-red-800 text-sm">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ root_path }}/setup" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
                <input type="email" name="email" required autofocus
                       class="w-full rounded-md border border-gray-300 py-2 px-3 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
                <input type="text" name="display_name"
                       class="w-full rounded-md border border-gray-300 py-2 px-3 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password *</label>
                <input type="password" name="password" required minlength="8"
                       class="w-full rounded-md border border-gray-300 py-2 px-3 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password *</label>
                <input type="password" name="password_confirm" required minlength="8"
                       class="w-full rounded-md border border-gray-300 py-2 px-3 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <button type="submit"
                    class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow">
                Create Admin Account
            </button>
        </form>
    </div>
</div>
{% endblock %}
