{% extends "base.html" %}
{% block title %}Reset Password - Remander{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-sm bg-white rounded-lg shadow p-8 space-y-6">
        <h1 class="text-2xl font-bold text-gray-900 text-center">Reset Password</h1>

        {% if expired %}
        <div class="px-4 py-3 rounded-lg bg-red-50 text-red-800 text-sm">
            This reset link has expired or is invalid.
        </div>
        <div class="text-center">
            <a href="{{ root_path }}/forgot-password" class="text-sm text-blue-600 hover:underline">Request a new link</a>
        </div>
        {% else %}

        {% if error %}
        <div class="px-4 py-3 rounded-lg bg-red-50 text-red-800 text-sm">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ root_path }}/reset-password" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input type="password" name="password" required autofocus minlength="8"
                       class="w-full rounded-md border border-gray-300 py-2 px-3 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" name="password_confirm" required minlength="8"
                       class="w-full rounded-md border border-gray-300 py-2 px-3 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <button type="submit"
                    class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow">
                Set New Password
            </button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}
