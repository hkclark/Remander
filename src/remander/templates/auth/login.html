{% extends "base.html" %}
{% block title %}Sign In - Remander{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-sm bg-white rounded-lg shadow p-8 space-y-6">
        <h1 class="text-2xl font-bold text-gray-900 text-center">Sign In</h1>

        {% if message %}
        <div class="px-4 py-3 rounded-lg bg-green-50 text-green-800 text-sm">{{ message }}</div>
        {% endif %}

        {% if error %}
        <div class="px-4 py-3 rounded-lg bg-red-50 text-red-800 text-sm">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ request.root_path }}/login" class="space-y-4">
            <input type="hidden" name="next" value="{{ next }}">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required autofocus
                       class="w-full rounded-md border border-gray-300 py-2 px-3 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full rounded-md border border-gray-300 py-2 px-3 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <button type="submit"
                    class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow">
                Sign In
            </button>
        </form>

        <div class="text-center">
            <a href="{{ request.root_path }}/forgot-password" class="text-sm text-blue-600 hover:underline">Forgot your password?</a>
        </div>
    </div>
</div>
{% endblock %}
