<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Remander{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-gray-800 text-white">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <a href="/" class="text-lg font-bold tracking-wide">Remander</a>
                <div class="flex items-center space-x-4 text-sm">
                    <a href="/" class="hover:text-gray-300 px-2 py-1 rounded {% block nav_dashboard %}{% endblock %}">Dashboard</a>
                    <a href="/devices" class="hover:text-gray-300 px-2 py-1 rounded {% block nav_devices %}{% endblock %}">Devices</a>
                    <a href="/bitmasks" class="hover:text-gray-300 px-2 py-1 rounded {% block nav_bitmasks %}{% endblock %}">Bitmasks</a>
                    <a href="/tags" class="hover:text-gray-300 px-2 py-1 rounded {% block nav_tags %}{% endblock %}">Tags</a>
                    <a href="/commands" class="hover:text-gray-300 px-2 py-1 rounded {% block nav_commands %}{% endblock %}">Commands</a>
                    <a href="/activity" class="hover:text-gray-300 px-2 py-1 rounded {% block nav_activity %}{% endblock %}">Activity</a>
                    <a href="/admin" class="hover:text-gray-300 px-2 py-1 rounded {% block nav_admin %}{% endblock %}">Admin</a>
                    {% if request.state.current_user %}
                    <span class="text-gray-500">|</span>
                    <span class="text-gray-300 text-xs">{{ request.state.current_user.display_name or request.state.current_user.email }}</span>
                    <a href="/logout" class="text-xs px-3 py-1 rounded bg-gray-600 hover:bg-gray-500 text-gray-100">Log Out</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>
    <script>
    function showToast(message) {
        const el = document.createElement('div');
        el.className = 'bg-green-600 text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium opacity-100 transition-opacity duration-500';
        el.textContent = message;
        document.getElementById('toast-container').appendChild(el);
        setTimeout(() => {
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        }, 8000);
    }
    </script>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
