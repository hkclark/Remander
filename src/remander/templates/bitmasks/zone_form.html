{% extends "base.html" %}
{% block title %}Create Zone Mask - Remander{% endblock %}
{% block nav_bitmasks %}bg-gray-900{% endblock %}

{% block content %}
<div class="space-y-6">
    <h1 class="text-2xl font-bold text-gray-900">Create Zone Mask</h1>

    <div class="bg-white rounded-lg shadow p-6">
        <form method="post" action="/bitmasks/zone/create" class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" name="name" id="name" required
                       class="mt-1 block w-full rounded border-gray-300 shadow-sm">
            </div>
            <div>
                <label for="mask_value" class="block text-sm font-medium text-gray-700">
                    Mask Value (4800 chars of 0/1, representing 80x60 grid)
                </label>
                <textarea name="mask_value" id="mask_value" rows="6" required
                          class="mt-1 block w-full rounded border-gray-300 shadow-sm font-mono text-xs"></textarea>
            </div>
            <div class="flex justify-end space-x-3">
                <a href="/bitmasks" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg text-sm">
                    Cancel
                </a>
                <button type="submit"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow text-sm font-medium">
                    Create
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
