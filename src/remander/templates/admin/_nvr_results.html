{% if error %}
<div class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700">
    Error querying NVR: {{ error }}
</div>
{% endif %}

{% if cameras %}
<div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Channel</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Online</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
            {% for cam in cameras %}
            <tr>
                <td class="px-4 py-3 text-sm">{{ cam.channel }}</td>
                <td class="px-4 py-3 text-sm font-medium">{{ cam.name }}</td>
                <td class="px-4 py-3">
                    {% if cam.online %}
                    <span class="px-2 py-1 rounded-full text-xs bg-green-100 text-green-700">Online</span>
                    {% else %}
                    <span class="px-2 py-1 rounded-full text-xs bg-red-100 text-red-700">Offline</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% elif not error %}
<div class="bg-gray-50 rounded-lg p-6 text-center text-gray-500">No cameras found.</div>
{% endif %}
