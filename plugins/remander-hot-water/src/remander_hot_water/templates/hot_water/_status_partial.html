{% if status.active %}
<div class="space-y-3">
    <div class="text-center">
        <div class="text-3xl font-mono font-bold text-blue-600"
             id="hw-countdown"
             data-remaining="{{ status.remaining_seconds }}">
            {{ "%02d:%02d"|format(status.remaining_seconds // 60, status.remaining_seconds % 60) }}
        </div>
        <div class="text-sm text-gray-500 mt-1">remaining</div>
    </div>
    <form hx-post="/hot-water/cancel"
          hx-target="#hot-water-widget"
          hx-swap="innerHTML">
        <button type="submit"
                class="w-full py-2 px-4 bg-red-500 hover:bg-red-600 text-white font-medium rounded-lg shadow text-sm">
            Cancel
        </button>
    </form>
</div>
<script>
(function() {
    const el = document.getElementById('hw-countdown');
    if (!el) return;
    let secs = parseInt(el.dataset.remaining, 10);
    const tick = setInterval(() => {
        secs--;
        if (secs <= 0) { clearInterval(tick); return; }
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }, 1000);
})();
</script>
{% else %}
<div class="flex flex-wrap gap-2 justify-center">
    {% for mins in settings.available_durations %}
    <form hx-post="/hot-water/start"
          hx-target="#hot-water-widget"
          hx-swap="innerHTML">
        <input type="hidden" name="duration_minutes" value="{{ mins }}">
        <button type="submit"
                class="py-2 px-4 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-lg shadow text-sm">
            {{ mins }} Min
        </button>
    </form>
    {% endfor %}
</div>
{% endif %}
